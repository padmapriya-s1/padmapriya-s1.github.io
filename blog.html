---
layout: page
title: Blog
---
<section class="list">
	{% if site.posts.size == 0 %}
		<p class="text-center"><a href="https://o-qcblog.github.io/">Quanta on Computing:</a> <a href="https://o-qcblog.github.io/">https://o-qcblog.github.io/</a> </p>
	{% else %}
		{% for post in site.posts %}
			{% if post.category == 'blog' %}
				{% if post.hidden != true %}
					{% include blog-post.html %}
				{% endif %}
			{% endif %}
		{% endfor %}
	{% endif %}
</section>
